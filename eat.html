'use strict';

// Storage module - handles IndexedDB operations
const Storage = (() => {
  const DB_NAME = 'what-to-eat';
  const DB_VERSION = 2;

  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('foods')) {
          db.createObjectStore('foods', { keyPath: 'id' });
        }
        if (!db.objectStoreNames.contains('history')) {
          const hs = db.createObjectStore('history', { keyPath: 'id', autoIncrement: true });
          hs.createIndex('foodId', 'foodId', { unique: false });
          hs.createIndex('timestamp', 'timestamp', { unique: false });
        }
        if (!db.objectStoreNames.contains('preferences')) {
          db.createObjectStore('preferences', { keyPath: 'key' });
        }
        if (!db.objectStoreNames.contains('tags')) {
          db.createObjectStore('tags', { keyPath: 'id' });
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function getAll(storeName) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(storeName, 'readonly');
      const req = tx.objectStore(storeName).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  }

  async function put(storeName, data) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(storeName, 'readwrite');
      const req = tx.objectStore(storeName).put(data);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function bulkPut(storeName, items) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(storeName, 'readwrite');
      const store = tx.objectStore(storeName);
      items.forEach(item => store.put(item));
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  async function remove(storeName, key) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(storeName, 'readwrite');
      tx.objectStore(storeName).delete(key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  async function getFoods() {
    let foods = await getAll('foods');
    if (foods.length === 0) {
      // First run - seed from inline data
      foods = JSON.parse(JSON.stringify(FOODS_DATA));
      await bulkPut('foods', foods);
    }
    return foods;
  }

  async function getTags() {
    let tags = await getAll('tags');
    if (tags.length === 0) {
      tags = JSON.parse(JSON.stringify(TAGS_DATA));
      await bulkPut('tags', tags);
    }
    return tags;
  }

  async function saveFood(food) {
    await put('foods', food);
  }

  async function deleteFood(id) {
    await remove('foods', id);
  }

  async function addHistory(foodId, scene) {
    const entry = {
      foodId,
      scene: scene || '随便吃',
      timestamp: Date.now()
    };
    await put('history', entry);
  }

  async function getHistory(limit = 50) {
    const all = await getAll('history');
    all.sort((a, b) => b.timestamp - a.timestamp);
    return all.slice(0, limit);
  }

  async function clearHistory() {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('history', 'readwrite');
      tx.objectStore('history').clear();
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  async function getPreferences() {
    const all = await getAll('preferences');
    const obj = {};
    all.forEach(p => { obj[p.key] = p.value; });
    return obj;
  }

  async function savePreference(key, value) {
    await put('preferences', { key, value });
  }

  async function savePreferences(prefs) {
    for (const [key, value] of Object.entries(prefs)) {
      await savePreference(key, value);
    }
  }

  async function exportData() {
    const foods = await getAll('foods');
    const history = await getAll('history');
    const preferences = await getPreferences();
    return JSON.stringify({ foods, history, preferences, exportedAt: new Date().toISOString() }, null, 2);
  }

  async function importData(jsonStr) {
    const data = JSON.parse(jsonStr);
    if (data.foods) await bulkPut('foods', data.foods);
    if (data.history) await bulkPut('history', data.history);
    if (data.preferences) await savePreferences(data.preferences);
  }

  return {
    getFoods, getTags, saveFood, deleteFood,
    addHistory, getHistory, clearHistory,
    getPreferences, savePreference, savePreferences,
    exportData, importData
  };

'use strict';

// Recommendation engine
const Recommender = (() => {
  const RECENT_PENALTY_DAYS = 3;
  const RECENT_PENALTY_POINTS = 30;
  const SCENE_SCORE = 20;
  const TASTE_SCORE = 15;
  const MEAL_TIME_SCORE = 10;
  const PRICE_SCORE = 5;

  function getCurrentMealTime() {
    const h = new Date().getHours();
    if (h < 10) return '早餐';
    if (h < 14) return '午餐';
    if (h < 17) return '下午茶';
    return '晚餐';
  }

  function calculateScores(foods, preferences, scene, history) {
    const currentMealTime = getCurrentMealTime();
    const recentFoodIds = new Set();
    const now = Date.now();
    const penaltyCutoff = now - RECENT_PENALTY_DAYS * 24 * 60 * 60 * 1000;

    history.forEach(h => {
      if (h.timestamp > penaltyCutoff) {
        recentFoodIds.add(h.foodId);
      }
    });

    const userTaste = preferences.taste || [];
    if (typeof userTaste === 'string') {
      // Handle legacy single string
    }

    return foods.map(food => {
      let score = food.weight * 2;

      // Scene matching
      if (food.scene === scene) {
        score += SCENE_SCORE;
      }

      // Taste matching
      if (userTaste && userTaste.length > 0 && food.tags) {
        const tasteTags = Array.isArray(userTaste) ? userTaste : [userTaste];
        const matchCount = tasteTags.filter(t => food.tags.includes(t)).length;
        score += matchCount * (TASTE_SCORE / 3);
      }

      // Meal time matching
      if (food.mealTime === currentMealTime) {
        score += MEAL_TIME_SCORE;
      }

      // Price level matching (prefer cheaper in 省钱模式, neutral otherwise)
      if (scene === '省钱模式') {
        score += (3 - food.priceLevel) * PRICE_SCORE;
      } else if (scene === '健康模式') {
        if (food.tags.includes('healthy')) score += PRICE_SCORE * 2;
        if (food.tags.includes('fried')) score -= PRICE_SCORE;
      } else if (scene === '减肥模式') {
        if (food.tags.includes('healthy')) score += PRICE_SCORE * 3;
        if (food.tags.includes('light')) score += PRICE_SCORE * 2;
        if (food.tags.includes('veggie')) score += PRICE_SCORE;
        if (food.tags.includes('fried')) score -= PRICE_SCORE * 2;
        if (food.tags.includes('heavy')) score -= PRICE_SCORE * 2;
        if (food.priceLevel >= 2) score += PRICE_SCORE;  // better ingredients cost more
        if (food.priceLevel === 1) score += PRICE_SCORE;
      } else if (scene === '想吃爽一点') {
        if (food.tags.includes('heavy') || food.tags.includes('meat') || food.tags.includes('fried')) {
          score += PRICE_SCORE;
        }
      } else if (scene === '很累模式') {
        if (food.tags.includes('comfort') || food.tags.includes('fast')) {
          score += PRICE_SCORE * 2;
        }
      } else if (scene === '聚餐模式') {
        if (food.priceLevel >= 2) score += PRICE_SCORE;
      }

      // Recent penalty
      if (recentFoodIds.has(food.id)) {
        score -= RECENT_PENALTY_POINTS;
      }

      // Add small randomness
      score += Math.random() * 5;

      food._score = Math.max(0, score);
      return food;
    });
  }

  function recommend(foods, preferences, scene, history) {
    const scored = calculateScores(foods, preferences, scene, history);
    scored.sort((a, b) => b._score - a._score);

    // Pick from top 30% randomly
    const topCount = Math.max(3, Math.ceil(scored.length * 0.3));
    const candidates = scored.slice(0, topCount);
    const pick = candidates[Math.floor(Math.random() * candidates.length)];

    return pick;
  }

  function recommendNext(foods, preferences, scene, history, excludeId) {
    const filtered = foods.filter(f => f.id !== excludeId);
    return recommend(filtered, preferences, scene, history);
  }

  return { recommend, recommendNext, calculateScores };
})();

'use strict';

// Main application module
const App = (() => {

        if (page === 'home') showPage('home');

  // ==================== Recommendation ====================
  function handleDecide() {
    const btn = document.getElementById('btn-decide');
    btn.disabled = true;
    btn.textContent = '🤔 正在思考...';
    btn.classList.add('thinking');

    // Show recommendation view
    document.getElementById('home-content').style.display = 'none';
    document.getElementById('recommend-view').style.display = 'block';

    // Animate
    animateRecommend(() => {
      let pool = foods;
      if (selectedCategories.length > 0) {
        pool = foods.filter(f => selectedCategories.includes(f.category));
      }
      const result = Recommender.recommend(pool, preferences, getCurrentScene(), history);
      currentFood = result;
      showRecommendResult(result);
      btn.disabled = false;
      btn.textContent = '🎲 帮我决定';
      btn.classList.remove('thinking');
    });
  }

  function animateRecommend(callback) {
    const container = document.getElementById('recommend-animation');
    const resultArea = document.getElementById('recommend-result');
    resultArea.style.display = 'none';
    container.style.display = 'flex';
    container.innerHTML = '';

    // Slot machine animation
    let count = 0;
    const totalFrames = 20;
    const interval = setInterval(() => {
      const randomFood = foods[Math.floor(Math.random() * foods.length)];
      container.innerHTML = `
        <div class="slot-item">
          <span class="slot-emoji">${randomFood.emoji}</span>
          <span class="slot-name">${randomFood.name}</span>
        </div>
      `;
      count++;
      if (count >= totalFrames) {
        clearInterval(interval);
        container.style.display = 'none';
        resultArea.style.display = 'block';
        if (callback) callback();
      }
    }, 80);
  }

  function showRecommendResult(food) {
    const resultArea = document.getElementById('recommend-result');
    // Entrance animation
    resultArea.classList.remove('result-enter');
    void resultArea.offsetWidth;
    resultArea.classList.add('result-enter');

    document.getElementById('result-tip').textContent = getResultTip();
    document.getElementById('result-emoji').textContent = food.emoji;
    document.getElementById('result-name').textContent = food.name;
    document.getElementById('result-category').textContent = food.category;
    document.getElementById('result-taste').textContent = food.taste;

    // Tags
    const tagContainer = document.getElementById('result-tags');
    tagContainer.innerHTML = '';
    if (food.tags) {
      food.tags.slice(0, 4).forEach(tagId => {
        const tagObj = tags.find(t => t.id === tagId);
        if (tagObj) {
          const span = document.createElement('span');
          span.className = 'tag';

    let pool = foods;

    const addTags = Array.from(document.querySelectorAll('#batch-tag-list .taste-btn.selected')).map(el => el.dataset.tagId);
    const action = document.getElementById('batch-action').value;

    for (const foodId of manageSelectedFoods) {
      const food = foods.find(f => f.id === foodId);
      if (!food) continue;
      if (!food.tags) food.tags = [];

      if (action === 'add') {
        addTags.forEach(t => { if (!food.tags.includes(t)) food.tags.push(t); });
      } else if (action === 'remove') {
        food.tags = food.tags.filter(t => !addTags.includes(t));
      } else if (action === 'replace') {
        food.tags = [...addTags];
      }

      await Storage.saveFood(food);
    }

    closeBatchModal();
    renderManageList();
    manageSelectedFoods = new Set();
    document.getElementById('manage-selected-count').textContent = '0';
    showToast(`已批量修改 ${manageSelectedFoods.size} 个餐品`);
  }

  // ==================== History ====================
  async function renderHistory() {
    history = await Storage.getHistory(200);
    const container = document.getElementById('history-list');

    if (history.length === 0) {
      container.innerHTML = '<div class="empty-state">还没有饮食记录，快去吃点东西吧！</div>';
      return;
    }

    // Group by date
    const groups = {};
    history.forEach(h => {
      const date = new Date(h.timestamp);
      const key = date.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'short' });
      if (!groups[key]) groups[key] = [];
      groups[key].push(h);
    });

    container.innerHTML = '';
    Object.entries(groups).forEach(([date, items]) => {
      const section = document.createElement('div');
      section.className = 'history-section';

      let itemsHtml = '';
      items.forEach(h => {
        const food = foods.find(f => f.id === h.foodId);
        const time = new Date(h.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        itemsHtml += `
          <div class="history-item">
            <span class="history-emoji">${food?.emoji || '🍽️'}</span>
            <div class="history-info">
              <span class="history-name">${food?.name || '未知餐品'}</span>
              <span class="history-meta">${h.scene || '随便吃'} · ${time}</span>
            </div>
          </div>
        `;
      });

      section.innerHTML = `
        <div class="history-date">${date}</div>
        ${itemsHtml}
      `;
      container.appendChild(section);
    });
  }

  // ==================== Settings ====================
  function renderSettings() {
    document.getElementById('settings-scene').value = preferences.defaultScene || '随便吃';

    // Show current taste prefs
    const tastes = preferences.tastes || [];
    const container = document.getElementById('settings-tastes');
    container.innerHTML = '';
    const tasteOptions = [
      { id: 'spicy', label: '🌶️ 辣' },
      { id: 'light', label: '🥬 清淡' },
      { id: 'sweet', label: '🍯 甜' },
      { id: 'salty', label: '🧂 咸' },
      { id: 'sour', label: '🍋 酸' },
      { id: 'numb', label: '🥴 麻' },
      { id: 'heavy', label: '😈 重口' }
    ];
    tasteOptions.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'taste-btn';
      if (tastes.includes(t.id)) btn.classList.add('selected');
      btn.dataset.tasteId = t.id;
      btn.textContent = t.label;
      btn.addEventListener('click', () => btn.classList.toggle('selected'));
      container.appendChild(btn);
    });

    // Tip mode
    if (preferences.tipMode) {
      const radio = document.querySelector(`input[name="tipMode"][value="${preferences.tipMode}"]`);
      if (radio) radio.checked = true;
    }
  }

  async function handleSavePrefs() {
    const tastes = Array.from(document.querySelectorAll('#settings-tastes .taste-btn.selected')).map(el => el.dataset.tasteId);
    if (tastes.length === 0) { showToast('至少选一个口味'); return; }
    const scene = document.getElementById('settings-scene').value;
    await Storage.savePreferences({ tastes, defaultScene: scene });
    preferences = await Storage.getPreferences();
    showToast('偏好已保存');
  }

  async function handleClearHistory() {
    if (confirm('确定清空所有历史记录？')) {
      await Storage.clearHistory();
      history = [];
      showToast('历史已清空');
      renderHistory();
    }
  }

  async function handleExport() {
    const data = await Storage.exportData();
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `food-data-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('导出成功');
  }

  function handleImport(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (!confirm('导入将合并数据，确定继续？')) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        await Storage.importData(ev.target.result);
        foods = await Storage.getFoods();
        history = await Storage.getHistory(100);
        showToast('导入成功');
        renderManageList();
        renderHomeStats();
      } catch (err) {
        showToast('导入失败：' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  function handleManageExport() {
    const filtered = getFilteredFoods();
    const data = JSON.stringify(filtered, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `manage-export-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  async function handleReset() {
    if (!confirm('确定重置所有数据？此操作不可撤销！')) return;
    if (!confirm('再次确认：所有餐品、历史、偏好将被清除！')) return;

    // Delete all IndexedDB stores
    const db = await new Promise((resolve, reject) => {
      const req = indexedDB.open('what-to-eat', 2);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    const stores = ['foods', 'history', 'preferences', 'tags'];
    for (const store of stores) {
      await new Promise((resolve, reject) => {
        const tx = db.transaction(store, 'readwrite');
        tx.objectStore(store).clear();
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }
    db.close();
    // Reload page
    window.location.reload();
  }

  // ==================== Toast ====================
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // ==================== Start ====================
  document.addEventListener('DOMContentLoaded', init);

  return {};
})();
